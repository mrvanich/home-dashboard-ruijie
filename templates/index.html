<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoL • Home Computers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .mac { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: .025em; }
        .card { transition: transform .1s, box-shadow .1s; }
        .section { font-size: .65rem; letter-spacing: .08em; text-transform: uppercase; font-weight: 700; color: #4ade80; }
        .dot-online { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }
        .dot-offline { width: 8px; height: 8px; border-radius: 50%; background: #52525b; }
        .sort-btn.active { background: #065f46; border-color: #10b981; color: #fff; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto px-5 py-8">
        <div class="flex items-center justify-between mb-7 flex-wrap gap-4">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-emerald-500 rounded-3xl flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-power-off text-xl text-white"></i>
                </div>
                <div>
                    <div class="font-semibold text-3xl tracking-[-1.2px]">Wake-on-LAN</div>
                    <div class="text-emerald-400/80 text-sm -mt-1">Your home computers • 192.168.24.0/24</div>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="/wol/dashboard" class="inline-flex items-center gap-x-2 rounded-3xl bg-emerald-600 hover:bg-emerald-500 px-4 py-2 text-sm font-medium transition">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>Dashboard</span>
                </a>
                <a href="http://192.168.24.8:9000" target="_blank" class="inline-flex items-center gap-x-2 rounded-3xl bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 px-4 py-2 text-sm font-medium transition">
                    <i class="fa-brands fa-docker"></i>
                    <span>Portainer</span>
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7">
                <div class="flex items-center justify-between mb-2 px-2 flex-wrap gap-2">
                    <div><span class="section">Saved Devices</span> <span id="saved-count" class="ml-2 font-mono text-xs px-2 py-px bg-emerald-900/60 text-emerald-300 rounded">0</span></div>
                    <div class="flex gap-2">
                        <button onclick="setSort('ip')" id="sort-ip" class="sort-btn text-xs px-3 py-1 rounded-2xl border border-zinc-700 hover:bg-zinc-800"><i class="fa-solid fa-sort-numeric-down mr-1"></i>IP</button>
                        <button onclick="setSort('status')" id="sort-status" class="sort-btn text-xs px-3 py-1 rounded-2xl border border-zinc-700 hover:bg-zinc-800"><i class="fa-solid fa-circle mr-1"></i>Online</button>
                        <button onclick="refreshSaved()" class="text-emerald-300 hover:text-white text-xs flex items-center gap-1 px-3 py-1 rounded-2xl hover:bg-zinc-900 border border-zinc-800"><i class="fa-solid fa-sync fa-xs mr-1"></i> REFRESH</button>
                    </div>
                </div>
                <div id="saved-list" class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden min-h-[210px] card"></div>
                <div class="px-2 mt-1 text-[10px] text-zinc-500">Persisted in <span class="font-mono">~/wol/data/machines.json</span></div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div>
                    <div class="px-2 mb-2"><span class="section">Add New</span></div>
                    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 card">
                        <form id="add-form" onsubmit="addMachine(event)">
                            <div class="space-y-3">
                                <div>
                                    <div class="text-xs text-zinc-400 mb-1">Name</div>
                                    <input name="name" type="text" placeholder="Gaming PC" required class="w-full rounded-2xl bg-zinc-950 border border-zinc-700 px-4 py-2 text-sm focus:outline-none focus:border-emerald-600">
                                </div>
                                <div>
                                    <div class="text-xs text-zinc-400 mb-1">MAC Address</div>
                                    <input name="mac" type="text" placeholder="00:11:22:33:44:55" required pattern="^([0-9A-Fa-f]{2}[:]){5}([0-9A-Fa-f]{2})$" class="w-full rounded-2xl bg-zinc-950 border border-zinc-700 px-4 py-2 font-mono text-sm focus:outline-none focus:border-emerald-600">
                                </div>
                                <div>
                                    <div class="text-xs text-zinc-400 mb-1">IP (optional)</div>
                                    <input name="ip" type="text" placeholder="192.168.24.27" class="w-full rounded-2xl bg-zinc-950 border border-zinc-700 px-4 py-2 font-mono text-sm focus:outline-none focus:border-emerald-600">
                                </div>
                            </div>
                            <button type="submit" class="mt-4 w-full bg-emerald-500 active:bg-emerald-600 transition text-white font-semibold py-[9px] rounded-2xl text-sm flex justify-center items-center gap-x-2">
                                <i class="fa-solid fa-plus"></i><span>SAVE DEVICE</span>
                            </button>
                        </form>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center px-2 mb-2 flex-wrap gap-2">
                        <span class="section">LAN Discovery</span>
                        <div class="flex gap-2">
                            <button onclick="setScanSort('ip')" id="scan-sort-ip" class="sort-btn text-xs px-2 py-1 rounded-2xl border border-zinc-700 hover:bg-zinc-800"><i class="fa-solid fa-sort-numeric-down"></i> IP</button>
                            <button onclick="setScanSort('status')" id="scan-sort-status" class="sort-btn text-xs px-2 py-1 rounded-2xl border border-zinc-700 hover:bg-zinc-800"><i class="fa-solid fa-circle"></i> Online</button>
                            <button onclick="scanLAN()" class="text-xs bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 px-3 py-1.5 rounded-2xl font-medium flex items-center gap-x-2">
                                <i class="fa-solid fa-search"></i><span>SCAN NOW</span>
                            </button>
                        </div>
                    </div>
                    <div id="scan-results" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 text-sm min-h-[148px]">
                        <div class="text-center text-zinc-400 pt-5 text-xs">Press "SCAN NOW" to list devices on your LAN.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-5 right-5 text-sm px-4 py-3 rounded-3xl shadow-2xl"></div>

    <script>
        let currentMachines = [];
        let scanDevices = [];
        let sortMode = 'name';
        let scanSortMode = 'ip';

        function ipToInt(ip) {
            if (!ip) return 0;
            return ip.split('.').reduce((a, o) => (a << 8) + parseInt(o, 10), 0) >>> 0;
        }

        function sortList(list, mode) {
            const copy = [...list];
            if (mode === 'ip') copy.sort((a, b) => ipToInt(a.ip) - ipToInt(b.ip));
            else if (mode === 'status') copy.sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0));
            else copy.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            return copy;
        }

        function setSort(mode) {
            sortMode = mode;
            document.querySelectorAll('#sort-ip, #sort-status').forEach(b => b.classList.remove('active'));
            document.getElementById('sort-' + mode)?.classList.add('active');
            renderSaved(currentMachines);
        }

        function setScanSort(mode) {
            scanSortMode = mode;
            document.querySelectorAll('#scan-sort-ip, #scan-sort-status').forEach(b => b.classList.remove('active'));
            document.getElementById('scan-sort-' + mode)?.classList.add('active');
            renderScan(scanDevices);
        }

        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.className = `fixed bottom-5 right-5 text-sm px-5 py-3 rounded-3xl shadow-2xl ${isError ? 'bg-red-600' : 'bg-emerald-600'} text-white`;
            t.textContent = text;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3200);
        }

        function statusDot(online) {
            return online
                ? '<span class="inline-flex items-center gap-1.5 text-emerald-400"><span class="dot-online"></span>Online</span>'
                : '<span class="inline-flex items-center gap-1.5 text-zinc-500"><span class="dot-offline"></span>Offline</span>';
        }

        function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

        function renderSaved(list) {
            currentMachines = list || [];
            const el = document.getElementById('saved-list');
            document.getElementById('saved-count').textContent = currentMachines.length;
            const sorted = sortList(currentMachines, sortMode);

            if (!sorted.length) {
                el.innerHTML = '<div class="p-8 text-center"><i class="fa-solid fa-laptop text-4xl text-zinc-700"></i><div class="mt-3 text-zinc-400 text-sm">No devices saved.</div></div>';
                return;
            }

            let html = '<table class="w-full text-sm"><thead><tr class="text-zinc-400 text-xs border-b border-zinc-800">';
            html += '<th class="text-left px-4 py-3 font-normal">Status</th><th class="text-left px-3 py-3 font-normal">Name</th>';
            html += '<th class="text-left px-3 py-3 font-normal">NetBIOS</th><th class="text-left px-3 py-3 font-normal">IP</th>';
            html += '<th class="text-left px-3 py-3 font-normal">MAC</th><th></th></tr></thead><tbody>';

            sorted.forEach(m => {
                const last = m.last_wake ? new Date(m.last_wake).toLocaleString('uk-UA', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '—';
                const nb = m.netbios || m.hostname || m.display_name || '—';
                html += `<tr class="border-b border-zinc-800 last:border-none hover:bg-zinc-950">
                    <td class="px-4 py-3 text-xs">${statusDot(m.online)}</td>
                    <td class="px-3 py-3 font-medium">${esc(m.name)}<div class="text-[10px] text-zinc-500">Wake: ${last}</div></td>
                    <td class="px-3 py-3 text-xs text-sky-300">${esc(nb)}</td>
                    <td class="px-3 py-3 font-mono text-xs">${esc(m.ip || '—')}</td>
                    <td class="px-3 py-3"><span class="mac px-2 py-0.5 bg-zinc-950 border border-zinc-700 rounded text-emerald-300 text-xs">${esc(m.mac)}</span></td>
                    <td class="px-3 py-2 text-right whitespace-nowrap">
                        <button onclick="doWake('${esc(m.mac)}', '${esc(m.name)}')" class="mr-1 px-3 py-1 text-xs bg-emerald-500 hover:bg-emerald-600 rounded-2xl text-white">Wake</button>
                        <button onclick="doDelete('${esc(m.mac)}', '${esc(m.name)}')" class="px-2 py-1 text-xs border border-zinc-700 hover:bg-red-900/50 text-red-300 rounded-2xl"><i class="fa-solid fa-trash fa-sm"></i></button>
                    </td></tr>`;
            });
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        function renderScan(list) {
            const box = document.getElementById('scan-results');
            scanDevices = list || [];
            if (!scanDevices.length) {
                box.innerHTML = '<div class="p-4 text-sm text-zinc-400">No devices found.</div>';
                return;
            }
            const sorted = sortList(scanDevices, scanSortMode);
            const onlineCount = sorted.filter(d => d.online).length;
            let h = `<div class="text-xs text-emerald-400 mb-2 px-1">${sorted.length} devices • ${onlineCount} online</div>`;
            h += '<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="text-zinc-500 border-b border-zinc-800">';
            h += '<th class="text-left py-2 px-1">Status</th><th class="text-left py-2 px-1">IP</th><th class="text-left py-2 px-1">NetBIOS</th><th class="text-left py-2 px-1">MAC</th><th class="text-left py-2 px-1">Vendor</th><th></th></tr></thead><tbody>';
            sorted.forEach(d => {
                const nb = d.netbios || d.hostname || d.display_name || '—';
                const already = currentMachines.some(x => x.mac === d.mac);
                h += `<tr class="border-t border-zinc-800 hover:bg-zinc-950">
                    <td class="py-2 px-1">${statusDot(d.online)}</td>
                    <td class="py-2 px-1 font-medium">${esc(d.ip)}</td>
                    <td class="py-2 px-1 text-sky-300">${esc(nb)}</td>
                    <td class="py-2 px-1 mac text-emerald-300">${esc(d.mac)}</td>
                    <td class="py-2 px-1 text-zinc-500 truncate max-w-[100px]">${esc(d.vendor || '')}</td>
                    <td class="py-2 px-1 text-right whitespace-nowrap">
                        <button onclick="doWake('${esc(d.mac)}', '${esc(d.ip)}')" class="px-2 py-0.5 bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] rounded">Wake</button>
                        ${!already ? `<button onclick="addScanned('${esc(d.mac)}', '${esc(d.ip)}', '${esc(nb)}', this)" class="ml-1 px-2 py-0.5 text-emerald-300 border border-emerald-700 rounded text-[10px]">+ Add</button>` : ''}
                    </td></tr>`;
            });
            h += '</tbody></table></div>';
            box.innerHTML = h;
        }

        async function refreshSaved() {
            showToast('Refreshing status...');
            const r = await fetch('api/machines');
            renderSaved(await r.json());
        }

        async function addMachine(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const payload = { name: fd.get('name'), mac: fd.get('mac'), ip: fd.get('ip') };
            const res = await fetch('api/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.ok) { e.target.reset(); await refreshSaved(); showToast('Device saved'); }
            else showToast(data.error || 'Failed', true);
        }

        async function doWake(mac, name) {
            showToast('Sending WoL to ' + name + '...');
            const res = await fetch('api/wake', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mac}) });
            const j = await res.json();
            if (j.success) { showToast('Wake sent to ' + name); if (j.machines) renderSaved(j.machines); }
            else showToast('Wake failed: ' + (j.output || ''), true);
        }

        async function doDelete(mac, name) {
            if (!confirm('Delete ' + name + '?')) return;
            const res = await fetch('api/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mac}) });
            renderSaved((await res.json()).machines);
            showToast('Deleted ' + name);
        }

        async function scanLAN() {
            const box = document.getElementById('scan-results');
            box.innerHTML = '<div class="flex items-center text-emerald-400 p-2"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Scanning + resolving NetBIOS...</div>';
            try {
                const r = await fetch('api/scan');
                const j = await r.json();
                if (j.error) showToast(j.error, true);
                renderScan(j.devices || []);
            } catch (err) {
                box.innerHTML = '<div class="p-3 text-red-400 text-sm">Scan failed: ' + err + '</div>';
            }
        }

        async function addScanned(mac, ip, nb, button) {
            const defaultName = nb && nb !== '—' ? nb : 'PC-' + ip.split('.').pop();
            const name = prompt('Friendly name?', defaultName);
            if (!name) return;
            button.disabled = true;
            const res = await fetch('api/add', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, mac, ip})});
            const data = await res.json();
            if (data.ok) { await refreshSaved(); showToast('Added ' + name); scanLAN(); }
            else { showToast(data.error || 'Add failed', true); button.disabled = false; }
        }

        async function init() {
            renderSaved({{ machines | tojson }});
            setSort('ip');
            setScanSort('ip');
        }
        window.onload = init;
    </script>
</body>
</html>
